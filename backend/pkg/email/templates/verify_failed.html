<!DOCTYPE html>
<html>

<head>
    <title>Email Verification Failed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 80px 20px;
            color: #334155;
        }

        .card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        h1 {
            color: #ef4444;
            font-size: 26px;
            margin-bottom: 16px;
        }

        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .icon {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">✕</div>
        <h1>Verification Failed</h1>
        <p>{{.Error}}</p>
    </div>
</body>

</html>
