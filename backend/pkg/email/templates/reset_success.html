<!DOCTYPE html>
<html>

<head>
    <title>Password Reset Successful</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 60px 20px;
            color: #334155;
        }

        .card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 1px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        h1 {
            color: #10b981;
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
        }

        .success-icon {
            font-size: 64px;
            color: #10b981;
            text-align: center;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            align-items: center;
        }

        .label {
            color: #64748b;
            font-weight: 500;
        }

        .value {
            color: #1e293b;
            font-weight: 600;
            text-align: right;
        }

        .flag {
            width: 24px;
            vertical-align: middle;
            margin-left: 6px;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Password Updated!</h1>
        <p style="text-align: center; color: #64748b; margin-bottom: 30px; font-size: 15px;">Your password has been
            reset successfully</p>

        <div class="info-row">
            <span class="label">IP Address</span>
            <span class="value">{{.IPAddress}}</span>
        </div>
        <div class="info-row">
            <span class="label">Location</span>
            <span class="value">{{.Location}} {{if .CountryFlag}}
        </div>
        <div class="info-row">
            <span class="label">Network / ISP</span>
            <span class="value">{{.ISP}} ({{.ConnectionTy}})</span>
        </div>
        <div class="info-row">
            <span class="label">Device</span>
            <span class="value">{{.Device}}</span>
        </div>
        <div class="info-row">
            <span class="label">Time</span>
            <span class="value">{{.Time}}</span>
        </div>
        <p style="text-align: center; margin-top: 30px; font-size: 13px; color: #94a3b8; line-height: 1.5;">For security
            reasons, we have logged out all other active sessions on your account.</p>
    </div>
</body>

</html>
