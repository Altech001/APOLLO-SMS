<!DOCTYPE html>
<html>

<head>
    <title>Reset Your Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 60px 20px;
            color: #334155;
        }

        .card {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 1px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border: 1px solid #e11d48;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e11d48;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #be123c;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Reset Password</h1>
        <form action="/api/v1/auth/reset-password" method="POST">
            <input type="hidden" name="token" value="{{.Token}}">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="6">
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>

</html>
